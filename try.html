<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgriSmart – Crop Shift Mitigation App</title>

  <link rel="stylesheet" href="style.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet"/>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>

<nav class="navbar">
  <a href="#" class="nav-logo">🌿 Agri<strong>Smart</strong></a>
  <ul class="nav-links">
    <li><a href="#home">Home</a></li>
    <li><a href="#dashboard">Dashboard</a></li>
    <li><a href="#compare">Compare</a></li>
    <li><a href="#insights">Insights</a></li>
  </ul>
</nav>

<section class="hero" id="home">
  <h1>AI-Powered Crop Decision Platform</h1>
  <p>Maximize profit. Minimize risk.</p>
  <a href="#dashboard" class="btn">Start Analysis</a>
</section>

<section id="dashboard" class="section">
  <h2>Dashboard</h2>

  <select id="locationSelect">
    <option value="punjab">Punjab</option>
    <option value="haryana">Haryana</option>
  </select>

  <select id="cropSelect">
    <option value="oilseed">Oilseed</option>
    <option value="paddy">Paddy</option>
    <option value="maize">Maize</option>
  </select>

  <button onclick="updateDashboard()">Analyze</button>

  <h3 id="profitVal">₹ --</h3>
  <h3 id="riskVal">--</h3>
  <h3 id="stabilityVal">--</h3>
  <h3 id="weatherVal">--</h3>
  <h3 id="yieldVal">--</h3>
</section>

<section id="compare">
  <h2>Comparison</h2>
  <canvas id="profitChart"></canvas>
</section>

<section id="insights">
  <h2>Insights</h2>
  <h3 class="accent-large">--</h3>
  <p class="confidence"></p>
  <div class="insight-reasons"></div>
</section>

<script>

document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener("click", function(e) {
    e.preventDefault();
    document.querySelector(this.getAttribute("href"))
      .scrollIntoView({ behavior: "smooth" });
  });
});

async function updateDashboard() {

  const location = document.getElementById("locationSelect").value;

  const res = await fetch("http://localhost:5000/analyze", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      location: location,
      landType: "rainfed",
      irrigation: "medium"
    })
  });

  const data = await res.json();
  const best = data.best_crop;

  document.getElementById("profitVal").innerText = "₹ " + best.final_profit;
  document.getElementById("riskVal").innerText =
    best.final_profit > 40000 ? "Low" : "Medium";

  document.getElementById("stabilityVal").innerText =
    (Math.random() * 3 + 7).toFixed(1) + " / 10";

  document.getElementById("weatherVal").innerText = "Favorable";
  document.getElementById("yieldVal").innerText =
    (Math.random() * 3 + 6).toFixed(1) + " Quintals/Acre";

  document.querySelector(".accent-large").innerText =
    "🌻 " + best.crop.toUpperCase();

  document.querySelector(".confidence").innerText =
    "Confidence: " + data.confidence + "%";

  document.querySelector(".insight-reasons").innerHTML =
    data.explanation.map(e => `<p>${e}</p>`).join("");

  updateChart(data.all_options);
}

let chart;

function updateChart(options) {

  const labels = options.map(o => o.crop);
  const profits = options.map(o => o.final_profit);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("profitChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        data: profits
      }]
    }
  });
}

</script>

</body>
</html>
